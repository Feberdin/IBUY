<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="IBUY addon logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0b0f"/>
      <stop offset="100%" stop-color="#1a1b24"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd86a"/>
      <stop offset="100%" stop-color="#d39c22"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4e7c7"/>
      <stop offset="100%" stop-color="#d9c493"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="72" fill="url(#bg)"/>

  <rect x="56" y="56" width="400" height="400" rx="28" fill="none" stroke="#3b2f17" stroke-width="8"/>
  <rect x="68" y="68" width="376" height="376" rx="22" fill="none" stroke="#a77b2c" stroke-width="2"/>

  <g filter="url(#shadow)">
    <rect x="150" y="120" width="220" height="280" rx="18" fill="url(#paper)" stroke="#7f6230" stroke-width="5"/>
    <path d="M330 120 L370 160 L330 160 Z" fill="#c8ae76" stroke="#7f6230" stroke-width="4"/>
    <line x1="180" y1="200" x2="340" y2="200" stroke="#9c7b43" stroke-width="6" stroke-linecap="round"/>
    <line x1="180" y1="240" x2="320" y2="240" stroke="#9c7b43" stroke-width="6" stroke-linecap="round"/>
    <line x1="180" y1="280" x2="335" y2="280" stroke="#9c7b43" stroke-width="6" stroke-linecap="round"/>
  </g>

  <g filter="url(#shadow)">
    <circle cx="352" cy="352" r="66" fill="url(#gold)" stroke="#6b4b12" stroke-width="7"/>
    <circle cx="352" cy="352" r="38" fill="none" stroke="#8f6518" stroke-width="6"/>
    <text x="352" y="366" text-anchor="middle" font-size="46" font-family="Georgia, 'Times New Roman', serif" fill="#2a1d07">$</text>
  </g>

  <text x="256" y="465" text-anchor="middle" font-size="68" font-family="Georgia, 'Times New Roman', serif" font-weight="700" fill="#f3c85e" letter-spacing="4">IBUY</text>
